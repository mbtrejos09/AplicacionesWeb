<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora virtual</title>
    <!-- Latest compiled and minified CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous">
<link rel="stylesheet" href="Examen1.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
</head>

<body>
    <header>
        <nav class="navbar primero">
          <span class="telefono"><i class="glyphicon glyphicon-earphone"></i> +506 8888 7777</span>
        </nav>
        <nav class="navbar segundo">
          <span class="titulo">Calculadora virtual</span>
        </nav>
      </header>

    <div class="calculadora">
         <input type="text" class="pantalla" id="resultado" placeholder="0" readonly>
        <div class="fondoCalculadora">
            <div class="teclas">
                <button class="operador">C</button>
                <button class="operador">Del</button>
                <button class="operador">%</button>
                <button class="operador">/</button>
                <button class="numero">7</button>
                <button class="numero">8</button>
                <button class="numero">9</button>
                <button class="operador">x</button> 
                <button class="numero">4</button>
                <button class="numero">5</button>
                <button class="numero">6</button>
                <button class="operador">-</button>
                <button class="numero">1</button>
                <button class="numero">2</button>
                <button class="numero">3</button>
                <button class="operador">+</button>
                <button class="operador">+/-</button>
                <button class="numero">0</button>
                <button class="operador">.</button>
                <button class="operador">=</button>
            </div>
        </div>
        </div>
</body>
</html>
